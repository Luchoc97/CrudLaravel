[phases.setup]
nixPkgs = ["php84","nodejs"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install"
]

[phases.build]
cmds = [
    "mkdir -p database",
    "touch database/database.sqlite",
    "npm run build",
    "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
